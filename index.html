<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logan House v7</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <main class="stage-wrap">
    <section class="game-stage" id="gameStage" aria-label="Logan's house">
      <img class="room" id="room" src="assets/rooms/logans-bedroom.png" alt="Current room" draggable="false" />
      <img class="logan" id="logan" src="assets/characters/logan/logan-32-front.png" alt="Logan" draggable="false" />
      <div class="dialog hidden" id="dialog" role="dialog" aria-live="polite"></div>
    </section>
    <p class="controls">Move with WASD/arrow keys. Interact/use stairs with E or Enter.</p>
  </main>
  <script src="src/main.js"></script>
</body>
</html>
