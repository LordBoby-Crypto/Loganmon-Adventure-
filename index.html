<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loganmon Prototype V1</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <main id="shell">
    <section id="game-card">
      <canvas id="game" width="640" height="480" aria-label="Loganmon Prototype V1 game canvas"></canvas>
      <div id="hint-bar">
        <strong>Controls:</strong> Arrow keys/WASD move or select, Enter/Space confirm/interact, Esc backs out. In battle, use arrows + Enter.
      </div>
    </section>
  </main>
  <script src="src/main.js"></script>
</body>
</html>
